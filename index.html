<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>| TEVA |</title>
    
    <link rel="apple-touch-icon" href="teva.png">
    <link rel="icon" type="image/png" sizes="32x32" href="teva.png">
    <link rel="icon" type="image/png" sizes="192x192" href="teva.png">
    
    <meta name="theme-color" content="#070b14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TEVA">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="TEVA">
    <meta name="msapplication-TileColor" content="#070b14">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=Noto+Sans+Khmer:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --gold-dim: rgba(201,168,76,0.18);
            --bg-deep: #070b14;
            --bg-mid: #0d1526;
            --teal: #1de9c8;
            --teal-dim: rgba(29,233,200,0.12);
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --border-gold: rgba(201,168,76,0.3);
            --text-primary: #f5f0e8;
            --text-secondary: rgba(245,240,232,0.55);
            --radius-card: 32px;
            --radius-btn: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Noto Sans Khmer', 'Hanuman', serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ─── Canvas BG ─────────────────────────── */
        #bgCanvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Noise overlay ─────────────────────── */
        .noise {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            opacity: 0.6;
        }

        /* ─── Status badge ──────────────────────── */
        .status-badge {
            position: fixed; top: 16px; right: 16px;
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 100px;
            font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
            font-family: 'Noto Sans Khmer', serif;
            z-index: 200; pointer-events: none;
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            background: rgba(7,11,20,0.6);
            transition: all 0.4s ease;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            animation: statusPulse 2s ease infinite;
        }
        .status-badge.online { color: #6dffd4; border-color: rgba(109,255,212,0.25); }
        .status-badge.online .status-dot { background: #6dffd4; }
        .status-badge.offline { color: #ffb347; border-color: rgba(255,179,71,0.25); }
        .status-badge.offline .status-dot { background: #ffb347; }
        @keyframes statusPulse {
            0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 currentColor; }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* ─── Main layout ───────────────────────── */
        .shell {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px;
            padding: 20px 20px 28px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ─── Logo / Brand ──────────────────────── */
        .brand {
            display: flex; flex-direction: column;
            align-items: center; gap: 6px;
            opacity: 0;
            animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
        }
        .brand-logo {
            font-family: 'Hanuman', serif;
            font-size: 11px; font-weight: 700;
            letter-spacing: 6px; text-transform: uppercase;
            color: var(--gold);
            display: flex; align-items: center; gap: 10px;
        }
        .brand-logo::before, .brand-logo::after {
            content: '';
            height: 1px; width: 28px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .brand-logo::after { transform: scaleX(-1); }
        .brand-name {
            font-family: 'Hanuman', serif;
            font-size: 44px; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #f0d080 0%, #c9a84c 40%, #f0d080 70%, #a8873a 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            filter: drop-shadow(0 0 24px rgba(201,168,76,0.4));
        }
        .brand-tagline {
            font-size: 11px; color: var(--text-secondary);
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* ─── Date pill ─────────────────────────── */
        .date-pill {
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
        }
        .date-pill-inner {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 9px 20px; border-radius: 100px;
            background: var(--surface);
            border: 1px solid var(--border-gold);
            backdrop-filter: blur(20px);
            font-size: 12.5px; color: var(--text-secondary);
            transition: border-color 0.3s;
        }
        .date-pill-inner:hover { border-color: rgba(201,168,76,0.5); }
        .date-pill-inner .label { color: var(--text-secondary); }
        .date-pill-inner .value { color: var(--gold-light); font-weight: 500; }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold);
            animation: livePulse 1.8s ease infinite;
        }
        @keyframes livePulse {
            0%,100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.35); }
        }

        /* ─── Main card ─────────────────────────── */
        .card {
            background: rgba(13,21,38,0.6);
            backdrop-filter: blur(32px) saturate(1.4);
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            padding: 28px 24px 24px;
            position: relative; overflow: hidden;
            opacity: 0;
            animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.38s forwards;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.02) inset,
                0 32px 64px rgba(0,0,0,0.5),
                0 0 80px rgba(201,168,76,0.04);
            transition: box-shadow 0.4s ease;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent 5%, var(--gold-dim) 30%, rgba(201,168,76,0.4) 50%, var(--gold-dim) 70%, transparent 95%);
        }
        .card:hover {
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03) inset,
                0 40px 80px rgba(0,0,0,0.6),
                0 0 100px rgba(201,168,76,0.07);
        }

        /* ─── Section label ─────────────────────── */
        .section-label {
            font-size: 10.5px; font-weight: 600;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: var(--border);
        }

        /* ─── Button group ──────────────────────── */
        .button-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            position: relative; width: 100%;
            padding: 0; border: none; cursor: pointer;
            border-radius: var(--radius-btn);
            background: none; overflow: hidden;
            font-family: 'Noto Sans Khmer', serif;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        .btn:hover { transform: translateY(-2px) scale(1.005); }
        .btn:active { transform: translateY(1px) scale(0.998); }

        .btn-inner {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-btn);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
            position: relative; overflow: hidden;
        }
        .btn:hover .btn-inner {
            background: var(--surface-hover);
            border-color: var(--border-gold);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 20px var(--gold-dim);
        }

        .btn-icon {
            width: 42px; height: 42px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
            position: relative; transition: transform 0.3s ease;
        }
        .btn:hover .btn-icon { transform: scale(1.1) rotate(-3deg); }

        .btn-icon-metfone { background: linear-gradient(135deg, #1a2f4a 0%, #0f1e30 100%); border: 1px solid rgba(100,160,255,0.2); }
        .btn-icon-cellcard { background: linear-gradient(135deg, #2a1a3a 0%, #1a0f2a 100%); border: 1px solid rgba(200,100,255,0.2); }
        .btn-icon-metfone1 { background: linear-gradient(135deg, #1a2a20 0%, #0f1f14 100%); border: 1px solid rgba(100,220,150,0.2); }

        .btn-text { flex: 1; text-align: left; }
        .btn-name {
            display: block; font-size: 16px; font-weight: 700;
            color: var(--text-primary); line-height: 1.2;
            transition: color 0.3s;
        }
        .btn:hover .btn-name { color: var(--gold-light); }
        .btn-sub {
            display: block; font-size: 10.5px;
            color: var(--text-secondary); margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .btn-arrow {
            width: 30px; height: 30px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: var(--gold-dim); color: var(--gold);
            font-size: 13px; flex-shrink: 0;
            transition: background 0.3s, transform 0.3s;
        }
        .btn:hover .btn-arrow {
            background: rgba(201,168,76,0.28);
            transform: translateX(3px);
        }

        /* Shimmer effect */
        .btn-inner::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }
        .btn:hover .btn-inner::after { left: 150%; }

        /* ─── Toasts ─────────────────────────────── */
        .toast-area {
            display: flex; justify-content: center;
            min-height: 36px; margin-top: 16px;
        }
        .toast-premium {
            display: none; align-items: center; gap: 8px;
            padding: 9px 18px; border-radius: 100px;
            background: rgba(13,30,22,0.9);
            border: 1px solid rgba(109,255,180,0.35);
            backdrop-filter: blur(20px);
            animation: toastBounce 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        .toast-premium .toast-icon { color: #6dffc4; font-size: 14px; }
        .toast-premium .toast-message {
            font-size: 13px; color: #6dffc4; font-weight: 500;
            font-family: 'Noto Sans Khmer', serif;
        }
        @keyframes toastBounce {
            from { opacity: 0; transform: scale(0.8) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ─── Card divider ──────────────────────── */
        .card-divider {
            height: 1px; margin: 20px 0;
            background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
        }

        /* ─── Footer ornament ───────────────────── */
        .card-footer {
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .ornament-line { height: 1px; flex: 1; background: var(--border); }
        .ornament-dots { display: flex; gap: 5px; }
        .ornament-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--border-gold);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .card:hover .ornament-dot {
            background: var(--gold);
            box-shadow: 0 0 6px var(--gold);
        }
        .ornament-dot:nth-child(2) { width: 6px; height: 6px; }

        /* ─── Hidden copy targets ────────────────── */
        .text-to-copy { position: absolute; opacity: 0; pointer-events: none; height: 0; overflow: hidden; }

        /* ─── Install button ─────────────────────── */
        .install-prompt {
            position: fixed; bottom: 22px; left: 50%;
            transform: translateX(-50%) translateY(0);
            padding: 13px 26px; border-radius: 100px;
            border: none; cursor: pointer;
            font-size: 14px; font-weight: 700;
            font-family: 'Noto Sans Khmer', serif;
            color: var(--bg-deep);
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            box-shadow: 0 8px 28px rgba(201,168,76,0.35), 0 0 0 1px rgba(255,255,255,0.1) inset;
            z-index: 100; display: none;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .install-prompt:hover {
            transform: translateX(-50%) translateY(-3px) scale(1.03);
            box-shadow: 0 14px 36px rgba(201,168,76,0.45), 0 0 0 1px rgba(255,255,255,0.15) inset;
        }
        .install-prompt:active { transform: translateX(-50%) translateY(0) scale(0.98); }

        /* ─── Update notification ────────────────── */
        .update-notification {
            position: fixed; bottom: 90px; left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px; border-radius: 100px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            color: var(--bg-deep); font-weight: 700; font-size: 13px;
            font-family: 'Noto Sans Khmer', serif;
            white-space: nowrap; z-index: 1000;
            box-shadow: 0 6px 20px rgba(201,168,76,0.4);
            animation: notifFade 3s ease forwards;
        }
        @keyframes notifFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(12px); }
            12% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        }

        /* ─── Rise animation ─────────────────────── */
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(22px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Responsive ─────────────────────────── */
        @media (max-height: 700px) {
            .shell { gap: 14px; padding: 14px 16px 18px; }
            .brand-name { font-size: 36px; }
            .btn-inner { padding: 13px 16px; }
            .btn-icon { width: 36px; height: 36px; border-radius: 11px; }
        }
        @media (max-width: 420px) {
            .shell { padding: 16px 14px 22px; }
        }
    </style>
</head>

<body>
    <canvas id="bgCanvas"></canvas>
    <div class="noise"></div>

    <div class="status-badge online" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">Online</span>
    </div>

    <div class="shell">

        <!-- Date pill -->
        <div class="date-pill">

        <!-- Card -->
        <div class="card">

                <button class="btn" onclick="copyText()">

                <button class="btn" onclick="copyCode()">

                            <span class="btn-name">សែលកាត</span>

                <!-- Metfone 1 -->
                <button class="btn" onclick="copyMetfone1()">
                    <div class="btn-inner">

                            <span class="btn-name">មេតហ្វូន ១</span>

                </div>
                <div id="toastMetfone1" class="toast-premium">

    <!-- Hidden copy targets -->
    <div class="text-to-copy" id="textToCopy">កំពុងផ្ទុកអត្ថបទ...</div>
    <div class="text-to-copy" id="codeToCopy">កំពុងផ្ទុកកូដ...</div>
    <div class="text-to-copy" id="metfone1ToCopy">កំពុងផ្ទុកអត្ថបទ METFONE1...</div>

    <!-- Install -->
    <button id="installBtn" class="install-prompt">📥 ដំឡើងកម្មវិធី</button>

    <script>
    /* ─── Animated canvas background ─────────────────────────────────── */
    (function() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [], frame = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Generate particles
        function initParticles() {
            particles = [];
            const count = Math.min(60, Math.floor(W * H / 14000));
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.5 + 0.3,
                    vx: (Math.random() - 0.5) * 0.18,
                    vy: -Math.random() * 0.22 - 0.06,
                    alpha: Math.random() * 0.4 + 0.1,
                    color: Math.random() > 0.5 ? '#c9a84c' : '#1de9c8',
                    life: Math.random() * 300 + 100,
                    age: Math.random() * 200
                });
            }
        }
        initParticles();

        // Orbs
        const orbs = [
            { x: 0.15, y: 0.35, r: 0.38, color: 'rgba(30,50,90,0.55)', ox: 0, oy: 0, speed: 0.0004, phase: 0 },
            { x: 0.82, y: 0.65, r: 0.32, color: 'rgba(60,30,90,0.45)', ox: 0, oy: 0, speed: 0.0003, phase: 2 },
            { x: 0.5,  y: 0.15, r: 0.28, color: 'rgba(20,80,70,0.35)', ox: 0, oy: 0, speed: 0.0005, phase: 4 },
        ];

        function draw() {
            frame++;
            ctx.clearRect(0, 0, W, H);

            // Deep gradient background
            const bg = ctx.createLinearGradient(0, 0, W * 0.4, H);
            bg.addColorStop(0, '#07101e');
            bg.addColorStop(0.5, '#070b14');
            bg.addColorStop(1, '#050810');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // Orbs
            orbs.forEach(o => {
                const t = frame * o.speed;
                const ox = Math.sin(t + o.phase) * 0.07 * W;
                const oy = Math.cos(t * 0.7 + o.phase) * 0.06 * H;
                const grd = ctx.createRadialGradient(
                    o.x * W + ox, o.y * H + oy, 0,
                    o.x * W + ox, o.y * H + oy, o.r * Math.min(W, H)
                );
                grd.addColorStop(0, o.color);
                grd.addColorStop(1, 'transparent');
                ctx.fillStyle = grd;
                ctx.fillRect(0, 0, W, H);
            });

            // Gold accent glow at top
            const topGlow = ctx.createRadialGradient(W * 0.5, -H * 0.1, 0, W * 0.5, 0, W * 0.5);
            topGlow.addColorStop(0, 'rgba(201,168,76,0.07)');
            topGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = topGlow;
            ctx.fillRect(0, 0, W, H);

            // Grid lines (subtle)
            ctx.strokeStyle = 'rgba(255,255,255,0.018)';
            ctx.lineWidth = 1;
            const step = 60;
            for (let x = 0; x < W; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
            }
            for (let y = 0; y < H; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
            }

            // Floating particles
            particles.forEach(p => {
                p.age++;
                p.x += p.vx;
                p.y += p.vy;
                if (p.age > p.life || p.y < -10 || p.x < -10 || p.x > W + 10) {
                    p.x = Math.random() * W;
                    p.y = H + 5;
                    p.age = 0;
                    p.alpha = Math.random() * 0.4 + 0.1;
                }
                const fade = p.age < 30 ? p.age/30 : p.age > p.life-30 ? (p.life-p.age)/30 : 1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${p.alpha * fade})`).replace('rgb', 'rgba').replace('##','#');
                // Simpler approach:
                ctx.globalAlpha = p.alpha * fade;
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            requestAnimationFrame(draw);
        }
        draw();
    })();

    /* ─── Version date ───────────────────────────────────────────────── */
    let lastUpdateTime = null;
    const khmerMonths = ['មករា','កុម្ភៈ','មីនា','មេសា','ឧសភា','មិថុនា','កក្កដា','សីហា','កញ្ញា','តុលា','វិច្ឆិកា','ធ្នូ'];

    function getKhmerMonth(m) { return khmerMonths[m]; }

    function formatDate(d) {
        return `${d.getDate().toString().padStart(2,'0')} ${getKhmerMonth(d.getMonth())} ${d.getFullYear()}`;
    }

    function updateVersionDate() {
        const now = new Date();
        document.getElementById('versionDateValue').textContent = formatDate(now);
        lastUpdateTime = now;
        localStorage.setItem('last_version_update', now.toISOString());
    }

    function loadSavedVersionDate() {
        const saved = localStorage.getItem('last_version_update');
        if (saved) {
            try {
                const d = new Date(saved);
                document.getElementById('versionDateValue').textContent = formatDate(d);
                lastUpdateTime = d;
            } catch(e) { updateVersionDate(); }
        } else { updateVersionDate(); }
    }

    /* ─── Status badge ───────────────────────────────────────────────── */
    function updateStatusBadge() {
        const badge = document.getElementById('statusBadge');
        const text = document.getElementById('statusText');
        if (navigator.onLine) {
            badge.className = 'status-badge online';
            text.textContent = 'Online';
        } else {
            badge.className = 'status-badge offline';
            text.textContent = 'Offline';
        }
    }

    /* ─── Update notification ────────────────────────────────────────── */
    function showUpdateNotification(title, message) {
        document.querySelectorAll('.update-notification').forEach(n => n.remove());
        const n = document.createElement('div');
        n.className = 'update-notification';
        n.textContent = `✨ ${title}: ${message}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    /* ─── Toast helpers ──────────────────────────────────────────────── */
    function showToast(el) {
        // Hide all toasts first
        document.querySelectorAll('.toast-premium').forEach(t => t.style.display = 'none');
        el.style.display = 'flex';
        setTimeout(() => { el.style.display = 'none'; }, 1800);
    }

    function copyText() {
        const text = document.getElementById('textToCopy').textContent;
        navigator.clipboard.writeText(text)
            .then(() => showToast(document.getElementById('toast')))
            .catch(() => fallbackCopyText(text, 'toast'));
    }
    function copyCode() {
        const code = document.getElementById('codeToCopy').textContent;
        navigator.clipboard.writeText(code)
            .then(() => showToast(document.getElementById('toastCode')))
            .catch(() => fallbackCopyText(code, 'toastCode'));
    }
    function copyMetfone1() {
        const content = document.getElementById('metfone1ToCopy').textContent;
        navigator.clipboard.writeText(content)
            .then(() => showToast(document.getElementById('toastMetfone1')))
            .catch(() => fallbackCopyText(content, 'toastMetfone1'));
    }

    function fallbackCopyText(text, toastId) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try {
            if (document.execCommand('copy')) showToast(document.getElementById(toastId));
            else alert('មិនអាចចម្លងអត្ថបទបានទេ។');
        } catch(e) { alert('មិនអាចចម្លងអត្ថបទបានទេ។'); }
        document.body.removeChild(ta);
    }

    /* ─── Content loaders ────────────────────────────────────────────── */
    let isFirstLoad = true;
    let lastUpdateCheck = 0;
    let isChecking = false;

    async function loadTextContent() {
        const el = document.getElementById('textToCopy');
        const old = localStorage.getItem('metfone_text');
        try {
            const r = await fetch('METFONE.txt?' + Date.now(), { cache: 'no-store' });
            if (r.ok) {
                const txt = await r.text();
                el.textContent = txt;
                if (old && old !== txt && !isFirstLoad) showUpdateNotification('មេតហ្វូន', 'បានធ្វើបច្ចុប្បន្នភាព');
                localStorage.setItem('metfone_text', txt);
                return old && old !== txt;
            }
        } catch(e) {}
        el.textContent = old || 'កាកម៉េសហ្អា';
        return false;
    }

    async function loadCodeContent() {
        const el = document.getElementById('codeToCopy');
        const old = localStorage.getItem('cellcard_code');
        try {
            const r = await fetch('CELLCARD.txt?' + Date.now(), { cache: 'no-store' });
            if (r.ok) {
                const txt = await r.text();
                el.textContent = txt;
                if (old && old !== txt && !isFirstLoad) showUpdateNotification('សែលកាត', 'បានធ្វើបច្ចុប្បន្នភាព');
                localStorage.setItem('cellcard_code', txt);
                return old && old !== txt;
            }
        } catch(e) {}
        el.textContent = old || 'TEVA555';
        return false;
    }

    async function loadMetfone1Content() {
        const el = document.getElementById('metfone1ToCopy');
        const old = localStorage.getItem('metfone1_text');
        try {
            const r = await fetch('METFONE1.txt?' + Date.now(), { cache: 'no-store' });
            if (r.ok) {
                const txt = await r.text();
                el.textContent = txt;
                if (old && old !== txt && !isFirstLoad) showUpdateNotification('មេតហ្វូន ១', 'បានធ្វើបច្ចុប្បន្នភាព');
                localStorage.setItem('metfone1_text', txt);
                return old && old !== txt;
            }
        } catch(e) {}
        el.textContent = old || 'កាកម៉េសហ្អា1';
        return false;
    }

    async function forceUpdateTextContent() {
        const el = document.getElementById('textToCopy');
        const old = localStorage.getItem('metfone_text');
        try {
            const r = await fetch('METFONE.txt?' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache, no-store' } });
            if (r.ok) {
                const txt = await r.text();
                if (old !== txt) { el.textContent = txt; localStorage.setItem('metfone_text', txt); showUpdateNotification('មេតហ្វូន', 'បានធ្វើបច្ចុប្បន្នភាពដោយស្វ័យប្រវត្តិ'); return true; }
            }
        } catch(e) {}
        return false;
    }

    async function forceUpdateCodeContent() {
        const el = document.getElementById('codeToCopy');
        const old = localStorage.getItem('cellcard_code');
        try {
            const r = await fetch('CELLCARD.txt?' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } });
            if (r.ok) {
                const txt = await r.text();
                if (old !== txt) { el.textContent = txt; localStorage.setItem('cellcard_code', txt); showUpdateNotification('សែលកាត', 'បានធ្វើបច្ចុប្បន្នភាពដោយស្វ័យប្រវត្តិ'); return true; }
            }
        } catch(e) {}
        return false;
    }

    async function forceUpdateMetfone1Content() {
        const el = document.getElementById('metfone1ToCopy');
        const old = localStorage.getItem('metfone1_text');
        try {
            const r = await fetch('METFONE1.txt?' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' } });
            if (r.ok) {
                const txt = await r.text();
                if (old !== txt) { el.textContent = txt; localStorage.setItem('metfone1_text', txt); showUpdateNotification('មេតហ្វូន ១', 'បានធ្វើបច្ចុប្បន្នភាពដោយស្វ័យប្រវត្តិ'); return true; }
            }
        } catch(e) {}
        return false;
    }

    async function autoUpdateCheck() {
        if (!navigator.onLine || isChecking) return;
        const now = Date.now();
        if (now - lastUpdateCheck < 30000) return;
        lastUpdateCheck = now;
        isChecking = true;
        try {
            const [u1, u2, u3] = await Promise.all([forceUpdateTextContent(), forceUpdateCodeContent(), forceUpdateMetfone1Content()]);
            if (u1 || u2 || u3) updateVersionDate();
        } catch(e) {}
        finally { isChecking = false; }
    }

    /* ─── PWA Manifest ───────────────────────────────────────────────── */
    function createManifest() {
        const m = { name: '𝕊𝕂𝕐ℕ𝔼𝕋', short_name: '𝕊𝕂𝕐ℕ𝔼𝕋', description: '𝕊𝕂𝕐ℕ𝔼𝕋🟢', start_url: '.', display: 'standalone', orientation: 'portrait', theme_color: '#070b14', background_color: '#070b14', icons: [{ src: 'teva.png', sizes: '192x192', type: 'image/png', purpose: 'any maskable' }, { src: 'teva.png', sizes: '512x512', type: 'image/png', purpose: 'any maskable' }] };
        const url = URL.createObjectURL(new Blob([JSON.stringify(m)], { type: 'application/json' }));
        const existing = document.querySelector('link[rel="manifest"]');
        if (existing) existing.remove();
        const link = document.createElement('link');
        link.rel = 'manifest'; link.href = url;
        document.head.appendChild(link);
    }
    createManifest();

    /* ─── Service Worker ─────────────────────────────────────────────── */
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('message', (e) => {
            if (e.data.type === 'contentUpdated' || e.data.type === 'backgroundUpdate') {
                updateVersionDate();
                showUpdateNotification('ជូនដំណឹង', 'កូដត្រូវបានធ្វើបច្ចុប្បន្នភាព');
            }
            if (e.data.type === 'updatesChecked' && e.data.hasUpdates) updateVersionDate();
        });
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW error:', e));
        });
    }

    /* ─── PWA Install ────────────────────────────────────────────────── */
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'flex'; });
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; deferredPrompt = null; installBtn.style.display = 'none'; }
    });
    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; deferredPrompt = null; showUpdateNotification('ជោគជ័យ', 'បានដំឡើងកម្មវិធី'); });
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) installBtn.style.display = 'none';

    /* ─── Event listeners ────────────────────────────────────────────── */
    window.addEventListener('online', () => {
        updateStatusBadge();
        showUpdateNotification('បណ្តាញ', 'កំពុងភ្ជាប់ - កំពុងពិនិត្យការធ្វើបច្ចុប្បន្នភាព');
        setTimeout(() => {
            Promise.all([forceUpdateTextContent(), forceUpdateCodeContent(), forceUpdateMetfone1Content()])
                .then(([u1,u2,u3]) => { if (u1||u2||u3) updateVersionDate(); });
        }, 100);
    });
    window.addEventListener('offline', () => updateStatusBadge());
    document.addEventListener('visibilitychange', () => { if (!document.hidden && navigator.onLine) autoUpdateCheck(); });
    setInterval(() => { if (navigator.onLine) autoUpdateCheck(); }, 30000);
    if ('connection' in navigator) navigator.connection.addEventListener('change', () => { if (navigator.onLine) autoUpdateCheck(); });

    /* ─── Init ───────────────────────────────────────────────────────── */
    loadSavedVersionDate();
    Promise.all([loadTextContent(), loadCodeContent(), loadMetfone1Content()]).then(([c1,c2,c3]) => {
        if (c1 || c2 || c3) updateVersionDate();
    });
    updateStatusBadge();
    setTimeout(() => { isFirstLoad = false; }, 1000);
    </script>
</body>
